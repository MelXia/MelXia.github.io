<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mel的花艺作品 - 静静看花，也很减压</title>
    <style>
        :root {
            --primary: #6B5CE7;
            --primary-light: #8B7CF7;
            --accent: #FF6B6B;
            --success: #4ECDC4;
            --bg: #1A1B2E;
            --card: #252742;
            --text: #E8E8F0;
            --text-muted: #9899AC;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .back-link {
            display: block;
            color: var(--primary-light);
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .page-header {
            text-align: center;
            padding: 20px 0;
        }

        .page-title {
            font-size: 1.5em;
            color: var(--primary-light);
            margin-bottom: 10px;
        }

        .page-desc {
            color: var(--text-muted);
            font-size: 0.95em;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .gallery-item {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .gallery-item.wide {
            grid-column: span 2;
        }

        .gallery-item.wide img {
            height: 280px;
        }

        .footer-nav {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--card);
        }

        .footer-nav a {
            color: var(--primary-light);
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="page-header">
            <h1 class="page-title">🌸 Mel的花艺作品</h1>
            <p class="page-desc">错过花艺减压沙龙的朋友，静静看看这些作品，也挺减压的。</p>
        </div>

        <div class="gallery">
            <div class="gallery-item wide">
                <img src="照片素材/花艺作品2.JPG" alt="花艺作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/花艺作品4.JPG" alt="花艺作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/花艺作品5.jpg" alt="花艺作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/花艺作品7.JPG" alt="花艺作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/花艺作品9.JPG" alt="花艺作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/花艺作品10.heic" alt="花艺作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/花艺作品14.jpg" alt="花艺作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/花艺作品15.JPG" alt="花艺作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/花艺作品18.JPG" alt="花艺作品">
            </div>
        </div>

        <div class="footer-nav">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>
</body>
</html>
