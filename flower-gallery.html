<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mel的花艺作品 - 静静看花，也很减压</title>
    <style>
        :root {
            --primary: #6B5CE7;
            --primary-light: #8B7CF7;
            --accent: #FF6B6B;
            --success: #4ECDC4;
            --bg: #1A1B2E;
            --card: #252742;
            --text: #E8E8F0;
            --text-muted: #9899AC;
        }

        [data-theme="light"] {
            --primary: #5B4CD7;
            --primary-light: #7B6CE7;
            --accent: #E85555;
            --success: #3DBDB4;
            --bg: #F5F5FA;
            --card: #FFFFFF;
            --text: #2A2A3E;
            --text-muted: #6A6A7E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* 导航 */
        .top-nav {
            background: var(--card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--primary);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-brand {
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 0.95em;
        }

        .nav-cta {
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-cta:hover { transform: scale(1.05); }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            font-size: 0.85em;
            text-decoration: none;
        }

        .nav-links a:hover { color: var(--accent); }

        .theme-toggle {
            background: var(--card);
            border: 1px solid var(--primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: var(--text);
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: white;
        }

        /* 汉堡菜单 */
        .menu-toggle {
            display: none;
            background: var(--card);
            border: 1px solid var(--primary);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
        }

        .menu-toggle span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text);
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: var(--card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--primary);
            z-index: 99;
            flex-direction: column;
            gap: 10px;
        }

        .mobile-menu.show {
            display: flex;
        }

        .mobile-menu a {
            color: var(--text);
            font-size: 0.9em;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            background: var(--bg);
        }

        .mobile-menu a:hover {
            background: var(--primary);
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            text-align: center;
            padding: 40px 20px 30px;
        }

        .page-title {
            font-size: 1.5em;
            color: var(--primary-light);
            margin-bottom: 10px;
        }

        .page-desc {
            color: var(--text-muted);
            font-size: 0.95em;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .gallery-item {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--primary);
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .gallery-item img:hover {
            opacity: 0.9;
        }

        .gallery-item.wide {
            grid-column: span 2;
        }

        .gallery-item.wide img {
            height: 280px;
        }

        /* 购买按钮 */
        .buy-section {
            text-align: center;
            margin-top: 30px;
            padding: 25px;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--primary);
        }

        .buy-title {
            font-size: 1.1em;
            color: var(--text);
            margin-bottom: 10px;
        }

        .buy-desc {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .buy-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-xiaohongshu {
            background: linear-gradient(135deg, #FF2442, #FE2C55);
            color: white;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 0.95em;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-xiaohongshu:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255,36,66,0.3);
        }

        .btn-email {
            background: var(--bg);
            color: var(--text);
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 0.95em;
            font-weight: 600;
            text-decoration: none;
            border: 2px solid var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-email:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .footer-nav {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--card);
        }

        .footer-nav a {
            color: var(--primary-light);
            font-size: 0.9em;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .nav-links { display: none; }
            .menu-toggle { display: flex; }
            .gallery { grid-template-columns: 1fr; }
            .gallery-item.wide { grid-column: span 1; }
            .gallery-item img, .gallery-item.wide img { height: 180px; }
            .buy-buttons { flex-direction: column; align-items: center; }
        }
    </style>
</head>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            if (html.getAttribute('data-theme') === 'light') {
                html.removeAttribute('data-theme');
                if (btn) btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                if (btn) btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.querySelector('.menu-toggle');
            menu.classList.toggle('show');
            toggle.classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.querySelector('.menu-toggle');
            if (menu && menu.classList.contains('show') && !e.target.closest('.mobile-menu') && !e.target.closest('.menu-toggle')) {
                menu.classList.remove('show');
                toggle.classList.remove('active');
            }
        });

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const btn = document.querySelector('.theme-toggle');
            if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                if (btn) btn.textContent = '☀️';
            }
        }

        initTheme();
    </script>
