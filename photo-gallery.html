<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用镜头捕捉美好 - Mel的摄影作品</title>
    <style>
        :root {
            --primary: #6B5CE7;
            --primary-light: #8B7CF7;
            --accent: #FF6B6B;
            --success: #4ECDC4;
            --bg: #1A1B2E;
            --card: #252742;
            --text: #E8E8F0;
            --text-muted: #9899AC;
        }

        [data-theme="light"] {
            --primary: #5B4CD7;
            --primary-light: #7B6CE7;
            --accent: #E85555;
            --success: #3DBDB4;
            --bg: #F5F5FA;
            --card: #FFFFFF;
            --text: #2A2A3E;
            --text-muted: #6A6A7E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            padding-top: 70px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* 导航 */
        .top-nav {
            background: var(--card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid var(--primary);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-brand {
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 0.95em;
        }

        .nav-cta {
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-cta:hover { transform: scale(1.05); }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            font-size: 0.85em;
            text-decoration: none;
        }

        .nav-links a:hover { color: var(--accent); }

        .theme-toggle {
            background: var(--card);
            border: 1px solid var(--primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: var(--text);
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: white;
        }

        /* 汉堡菜单 */
        .menu-toggle {
            display: none;
            background: var(--card);
            border: 1px solid var(--primary);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
        }

        .menu-toggle span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text);
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: var(--card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--primary);
            z-index: 99;
            flex-direction: column;
            gap: 10px;
        }

        .mobile-menu.show {
            display: flex;
        }

        .mobile-menu a {
            color: var(--text);
            font-size: 0.9em;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            background: var(--bg);
        }

        .mobile-menu a:hover {
            background: var(--primary);
            color: white;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .back-link { display: block; color: var(--primary-light); font-size: 0.9em; margin-bottom: 20px; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .page-header { text-align: center; padding: 20px 0; }
        .page-title { font-size: 1.5em; color: var(--primary-light); margin-bottom: 10px; }
        .page-desc { color: var(--text-muted); font-size: 0.95em; }
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .gallery-item { background: var(--card); border-radius: 12px; overflow: hidden; }
        .gallery-item img { width: 100%; height: 180px; object-fit: cover; }
        .gallery-item.wide { grid-column: span 2; }
        .gallery-item.wide img { height: 280px; }
        .footer-nav { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--card); }
        .footer-nav a { color: var(--primary-light); font-size: 0.9em; text-decoration: none; }
        .footer-nav a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .nav-links { display: none; }
            .menu-toggle { display: flex; }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html" style="text-decoration:none;">
                <div class="nav-brand">有钳任性横着走的Mel</div>
            </a>
            <a href="index.html#contact" class="nav-cta">约个时间</a>
        </div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="casebook.html">翻译案例</a>
            <a href="about.html">关于我</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
        <button class="menu-toggle" onclick="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- 移动端下拉菜单 -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">首页</a>
        <a href="casebook.html">翻译案例</a>
        <a href="about.html">关于我</a>
        <a href="flower-gallery.html">花艺作品</a>
        <a href="#" onclick="toggleTheme(); toggleMobileMenu(); return false;">切换配色</a>
    </div>

    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="page-header">
            <h1 class="page-title">📷 用镜头捕捉美好</h1>
            <p class="page-desc">摄影也是一种减压的方式。<br>静静看这些照片，也许能让紧绷的心稍微放松一下。</p>
        </div>

        <div class="gallery">
            <div class="gallery-item wide">
                <img src="照片素材/摄影作品1.jpg" alt="摄影作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/摄影作品2.JPG" alt="摄影作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/摄影作品3.JPG" alt="摄影作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/摄影作品4.JPG" alt="摄影作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/摄影作品5.JPG" alt="摄影作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/摄影作品6.HEIC" alt="摄影作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/摄影作品7.jpg" alt="摄影作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/摄影作品8.jpg" alt="摄影作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/摄影作品9.jpg" alt="摄影作品">
            </div>
            <div class="gallery-item">
                <img src="照片素材/摄影作品10.JPG" alt="摄影作品">
            </div>
        </div>

        <div class="footer-nav">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            if (html.getAttribute('data-theme') === 'light') {
                html.removeAttribute('data-theme');
                if (btn) btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                if (btn) btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.querySelector('.menu-toggle');
            menu.classList.toggle('show');
            toggle.classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.querySelector('.menu-toggle');
            if (menu && menu.classList.contains('show') && !e.target.closest('.mobile-menu') && !e.target.closest('.menu-toggle')) {
                menu.classList.remove('show');
                toggle.classList.remove('active');
            }
        });

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const btn = document.querySelector('.theme-toggle');
            if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                if (btn) btn.textContent = '☀️';
            }
        }

        initTheme();
    </script>
</body>
</html>
