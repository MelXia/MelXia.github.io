<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>2026年广州中考自主招生分数及排名查询</title>
    <style>
        :root {
            --primary: #6B5CE7;
            --primary-light: #8B7CF7;
            --accent: #FF6B6B;
            --success: #4ECDC4;
            --bg: #1A1B2E;
            --card: #252742;
            --text: #E8E8F0;
            --text-muted: #A5A6B8;
            --line: rgba(139,124,247,.42);
            --shadow: 0 16px 45px rgba(5,6,20,.25);
        }
        [data-theme="light"] {
            --primary: #5B4CD7;
            --primary-light: #7B6CE7;
            --accent: #E85555;
            --success: #3DBDB4;
            --bg: #F5F5FA;
            --card: #FFFFFF;
            --text: #2A2A3E;
            --text-muted: #6A6A7E;
            --line: rgba(91,76,215,.28);
            --shadow: 0 16px 45px rgba(65,57,110,.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* 顶部导航 */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: color-mix(in srgb, var(--card) 94%, transparent);
            border-bottom: 1px solid var(--primary);
            backdrop-filter: blur(12px);
        }
        .nav-brand {
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 0.95em;
        }
        .nav-links { display: flex; align-items: center; gap: 15px; }
        .nav-links a {
            color: var(--text-muted);
            font-size: 0.85em;
            text-decoration: none;
        }
        .nav-links a:hover { color: var(--accent); }

        /* 汉堡菜单按钮 */
        .menu-toggle {
            display: none;
            background: var(--card);
            border: 1px solid var(--primary);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
        }
        .menu-toggle span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text);
            transition: all 0.3s ease;
        }
        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* 移动端下拉菜单 */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: var(--card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--primary);
            z-index: 99;
            flex-direction: column;
            gap: 10px;
        }
        .mobile-menu.show { display: flex; }
        .mobile-menu a {
            color: var(--text);
            font-size: 0.9em;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            background: var(--bg);
        }
        .mobile-menu a:hover { background: var(--primary); color: white; }

        /* 主题切换按钮 */
        .theme-toggle {
            width: 38px;
            height: 38px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
        }
        .theme-toggle:hover { background: var(--primary); }

        /* Hero 区域 */
        .hero {
            min-height: 0;
            padding: 56px 20px 34px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(180deg, rgba(107,92,231,.17), var(--bg));
        }
        .hero-title {
            margin: 0 0 10px;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            line-height: 1.25;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-desc {
            max-width: 480px;
            margin: 0 auto;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* 查询区域 */
        .query-section { padding: 30px 20px 50px; }
        .query-card {
            max-width: 600px;
            margin: 0 auto 18px;
            padding: 24px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        label { display: block; margin-bottom: 9px; font-weight: 700; }
        .input-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }
        input {
            width: 100%;
            min-width: 0;
            padding: 14px 15px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            font-size: 1.05rem;
        }
        input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(107,92,231,.18);
        }
        button[type="submit"] {
            border-radius: 12px;
            background: var(--primary);
            border: 0;
            color: white;
            padding: 14px 28px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s;
        }
        button[type="submit"]:hover { background: var(--primary-light); }
        .field-help { margin: 10px 0 0; color: var(--text-muted); font-size: 0.82rem; }
        .error { color: #ff8585; margin: 12px 0 0; }

        /* 结果卡片 */
        .result-card { display: none; }
        .result-card.show { display: block; }
        .result-heading { display: flex; align-items: center; gap: 9px; }
        .result-heading h2 { margin: 0; font-size: 1.2rem; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); }
        .score-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 18px 0 0;
        }
        .score-grid div { padding: 17px; background: var(--bg); border-radius: 12px; }
        dt { color: var(--text-muted); font-size: 0.82rem; }
        dd { margin: 7px 0 0; font-size: 1.4rem; font-weight: 800; }

        /* 解锁区域 */
        .unlock-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--line);
        }
        .unlock-copy h3 { margin: 0 0 6px; font-size: 1rem; }
        .unlock-copy p { margin: 0; color: var(--text-muted); font-size: 0.88rem; }
        .secondary-button {
            white-space: nowrap;
            background: var(--primary);
            border: 0;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
        }
        .secondary-button:hover { background: var(--primary-light); }

        /* 排名信息 */
        .rank-info { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line); }
        .rank-info h3 { font-size: 1rem; margin-bottom: 12px; }
        .rank-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .rank-grid div { padding: 15px; background: var(--bg); border-radius: 12px; }
        .method-note { margin-top: 15px; color: var(--text-muted); font-size: 0.8rem; }

        /* 支付区域 */
        .payment-section {
            margin-top: 20px;
            padding: 20px;
            background: var(--bg);
            border-radius: 14px;
            text-align: center;
        }
        .payment-section h3 { margin-bottom: 10px; }
        .payment-section p { color: var(--text-muted); font-size: 0.87rem; margin-bottom: 15px; }
        .payment-qr { width: 120px; border-radius: 10px; margin-bottom: 15px; }
        .btn-pay {
            background: var(--accent);
            width: 100%;
            border: 0;
            color: white;
            padding: 13px 24px;
            border-radius: 28px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.25s;
        }
        .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,107,107,.35); }

        /* 数据来源与信息安全 */
        .privacy-section { padding: 38px 20px 55px; background: var(--card); }
        .section-header { text-align: center; margin-bottom: 28px; }
        .section-title { margin: 0 0 6px; font-size: 1.55rem; }
        .section-subtitle { margin: 0; color: var(--text-muted); font-size: 0.92rem; }
        .privacy-grid {
            max-width: 620px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .privacy-card {
            padding: 22px;
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 14px;
        }
        .privacy-icon {
            display: inline-flex;
            padding: 5px 11px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--success), var(--primary-light));
            color: #fff;
            font-size: 0.78rem;
            font-weight: 800;
        }
        .privacy-card h3 { margin: 14px 0 8px; font-size: 1rem; }
        .privacy-card p { margin: 0; color: var(--text-muted); font-size: 0.86rem; }
        .disclaimer {
            max-width: 620px;
            margin: 20px auto 0;
            padding: 16px 18px;
            border-left: 3px solid var(--accent);
            background: var(--bg);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 28px 20px;
            color: var(--text-muted);
            font-size: 0.82rem;
        }
        .footer p { margin: 4px; }

        /* 返回顶部 */
        .back-top {
            position: fixed;
            right: 20px;
            bottom: 20px;
            display: none;
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }

        /* 移动端适配 */
        @media (max-width: 650px) {
            .hero { padding: 42px 20px 26px; }
            .query-section { padding: 30px 14px; }
            .input-row { grid-template-columns: 1fr; }
            .input-row button { width: 100%; }
            .score-grid, .rank-grid, .privacy-grid { grid-template-columns: 1fr; }
            .unlock-area { align-items: stretch; flex-direction: column; }
            .secondary-button { width: 100%; }
            .query-card { padding: 20px; }
            .nav-links { display: none; }
            .menu-toggle { display: flex; }
        }
    </style>
</head>
<body>
    <nav class="top-nav" aria-label="页面导航">
        <div class="nav-brand">成绩排名快速查询</div>

    <main>
        <section class="hero">
            <h1 class="hero-title">2026 年广州中考自主招生<br>分数及排名查询</h1>
        </section>

        <section class="query-section" id="query">
            <div class="query-card">
                <form onsubmit="handleQuery(event)">
                    <label for="candidateNo">请输入10位数的考生编号</label>
                    <div class="input-row">
                        <input type="text" id="candidateNo" placeholder="例如：0103XXXXXX" maxlength="10" inputmode="numeric" required>
                        <button type="submit">查询成绩</button>
                    </div>
                    <p class="error" id="errorMsg"></p>
                </form>
            </div>

            <div class="query-card result-card" id="resultCard">
                <div class="result-heading">
                    <span class="status-dot"></span>
                    <h2>查询结果</h2>

                <dl class="score-grid">

                <div class="rank-info" id="rankInfo" style="display:none;">
                    <h3>排名信息</h3>
                    <dl class="rank-grid">

                        <div><dt>距上一档分差</dt><dd id="resultGap">-</dd></div>
                        <div><dt>同分考生人数</dt><dd id="resultTie">-</dd></div>
                    </dl>
                    <p class="method-note">"上一档成绩"指高于当前成绩的最近一个不同分数。并列考生排名相同，后续名次按人数顺延。</p>
                </div>
                <div class="unlock-area" id="unlockArea" style="display:none;">
                    <div class="unlock-copy" style="text-align:center;width:100%;">
                        <p>你可以通过官网公告统计比该生成绩更高的人数，免费获得初步排名；或<span style="color:var(--accent);font-weight:700;">支付1元</span>，立即快速查看排名。</p>
                    </div>
                    <button class="secondary-button" type="button" onclick="showPayment()" style="margin:15px auto 0;display:block;">付费查看排名</button>
                </div>
            </div>
        </section>

        <section class="privacy-section" aria-labelledby="privacy-title">
            <div class="section-header">
                <h2 class="section-title" id="privacy-title">数据来源</h2>
            </div>

        </section>
    </main>

    <!-- 支付弹窗 -->
    <dialog id="payment-dialog" style="width:min(300px,calc(100% - 28px));padding:24px;border:1px solid var(--line);border-radius:18px;background:var(--card);color:var(--text);box-shadow:0 25px 90px rgba(0,0,0,.45);border:none;outline:none;top:50%;left:50%;transform:translate(-50%,-50%);position:fixed;">
        <button onclick="closePaymentDialog()" style="position:absolute;right:12px;top:10px;border:0;background:transparent;color:var(--text-muted);font-size:28px;cursor:pointer;">×</button>
        <p style="text-align:center;margin:0 0 15px;font-size:1rem;">长按下方二维码支付1元</p>
        <img id="paymentQR" src="照片素材/payment-qr.jpg" alt="收款码" style="width:140px;border-radius:10px;margin:0 auto;display:block;">
        <button id="confirmPayBtn" class="btn-pay" onclick="showRank()" disabled style="margin-top:15px;background:#666;cursor:not-allowed;">我已完成支付，查看排名</button>
    </dialog>

        const INDEX = new Map(RECORDS.map(r => [r.candidateNo, r]));
        let currentRecord = null;

        function handleQuery(e) {
            e.preventDefault();
            const input = document.getElementById('candidateNo');
            const errorMsg = document.getElementById('errorMsg');
            const resultCard = document.getElementById('resultCard');
            const rankInfo = document.getElementById('rankInfo');
            const unlockArea = document.getElementById('unlockArea');

            errorMsg.textContent = '';
            rankInfo.style.display = 'none';
            unlockArea.style.display = 'none';

            const candidateNo = input.value.trim();
            if (!/^0\d{9}$/.test(candidateNo)) {
                errorMsg.textContent = '请输入正确的10位考生号（以0开头）。';
                return;
            }

            const record = INDEX.get(candidateNo);
            if (!record) {
                errorMsg.textContent = '未查询到该考生号，请核对后重试。';
                return;
            }

            currentRecord = record;
            resultCard.classList.add('show');

            document.getElementById('resultSchool').textContent = record.school;
            document.getElementById('resultCandidate').textContent = maskNo(candidateNo);

            if (record.status === 'absent') {
                document.getElementById('resultScore').textContent = '缺考';
            } else {
                document.getElementById('resultScore').textContent = record.score.toFixed(1).replace(/\.0$/, '') + ' 分';
                unlockArea.style.display = 'flex';
            }

            resultCard.scrollIntoView({ behavior: 'smooth' });
        }

        function maskNo(no) {
            return no.slice(0, 4) + '***' + no.slice(-3);
        }

        function showPayment() {
            document.getElementById('payment-dialog').showModal();
        }

        function showRank() {
            if (!currentRecord) return;
            const rankInfo = document.getElementById('rankInfo');
            const unlockArea = document.getElementById('unlockArea');

            document.getElementById('resultRank').textContent = '第 ' + currentRecord.rank + ' 名';
            document.getElementById('resultGap').textContent = currentRecord.gapToPrevious == null ? '已是最高分' : currentRecord.gapToPrevious.toFixed(1).replace(/\.0$/, '') + ' 分';
            document.getElementById('resultTie').textContent = '共 ' + currentRecord.tieCount + ' 人';

            rankInfo.style.display = 'block';
            unlockArea.style.display = 'none';
            document.getElementById('payment-dialog').close();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-toggle');
            const current = html.getAttribute('data-theme');
            if (current === 'light') {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menu-toggle');
            menu.classList.toggle('show');
            toggle.classList.toggle('active');
        }

        function closeMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menu-toggle');
            menu.classList.remove('show');
            toggle.classList.remove('active');
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            const btn = document.getElementById('theme-toggle');
            if (saved === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                if (btn) btn.textContent = '☀️';
            }
        }

        // 返回顶部
        window.addEventListener('scroll', function() {
            const btn = document.getElementById('back-top');
            btn.style.display = window.scrollY > 300 ? 'block' : 'none';
        });

        // 点击页面其他区域关闭菜单
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menu-toggle');
            if (menu.classList.contains('show') && !e.target.closest('.mobile-menu') && !e.target.closest('.menu-toggle')) {
                closeMobileMenu();
            }
        });

        initTheme();

        // 只允许输入数字
        document.getElementById('candidateNo').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
        });
    </script>
